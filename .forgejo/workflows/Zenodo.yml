name: Zenodo

on:
  workflow_dispatch:

jobs:
  zenodo:
    runs-on: codeberg-medium-lazy

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Project.toml
        id: version
        run: |
          VERSION=$(grep '^version' Project.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Zenodo — create new version draft
        id: zenodo_draft
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          ZCURL="curl -s --retry 3 --retry-delay 20 --max-time 60"
          CONCEPT_ID=17985768
          LATEST=$($ZCURL "https://zenodo.org/api/records?q=conceptrecid:$CONCEPT_ID&sort=mostrecent&size=1" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          LATEST_ID=$(echo "$LATEST" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
          if [ -z "$LATEST_ID" ]; then
            echo "ERROR: could not find latest published version (Zenodo may be down)"
            exit 1
          fi
          echo "Latest published version ID: $LATEST_ID"
          RESPONSE=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$LATEST_ID/versions" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Create version status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "201" ]; then
            NEW_ID=$(echo "$BODY" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
            echo "New draft created: $NEW_ID"
          else
            echo "Create failed (${BODY:0:200}), searching for existing draft..."
            DRAFTS=$($ZCURL \
              "https://zenodo.org/api/user/records?q=conceptrecid:$CONCEPT_ID&is_draft=true&sort=mostrecent&size=1" \
              -H "Authorization: Bearer $ZENODO_TOKEN")
            echo "Existing drafts: ${DRAFTS:0:300}"
            NEW_ID=$(echo "$DRAFTS" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
            if [ -z "$NEW_ID" ]; then
              echo "ERROR: could not create or find a draft (Zenodo may be down — retry later)"
              exit 1
            fi
            echo "Reusing existing draft: $NEW_ID"
          fi
          echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
          echo "Draft ID: $NEW_ID"

      - name: Zenodo — update version metadata
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          ZCURL="curl -s --retry 3 --retry-delay 20 --max-time 60"
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          VERSION=${{ steps.version.outputs.value }}
          DRAFT_RESP=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" \
            "https://zenodo.org/api/records/$NEW_ID/draft" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          DRAFT_STATUS=$(echo "$DRAFT_RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          DRAFT=$(echo "$DRAFT_RESP" | grep -v "HTTP_STATUS:")
          echo "Draft fetch status: $DRAFT_STATUS"
          if [ "$DRAFT_STATUS" != "200" ]; then
            echo "ERROR: could not fetch draft: ${DRAFT:0:400}"
            exit 1
          fi
          UPDATED=$(echo "$DRAFT" | python3 -c "import sys,json;raw=sys.stdin.read().strip();d,_=json.JSONDecoder().raw_decode(raw);d['metadata']['version']=sys.argv[1];print(json.dumps({'metadata':d['metadata']}))" "$VERSION")
          RESP=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X PUT \
            "https://zenodo.org/api/records/$NEW_ID/draft" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$UPDATED")
          echo "Metadata update status: $(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)"

      - name: Zenodo — upload source archive
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          ZCURL="curl -s --retry 3 --retry-delay 20 --max-time 120"
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          VERSION=${{ steps.version.outputs.value }}
          FILENAME="TensND.jl-v${VERSION}.tar.gz"
          echo "Draft ID: $NEW_ID  Archive: $FILENAME"
          git archive --format=tar.gz --prefix="TensND.jl-${VERSION}/" -o "$FILENAME" HEAD
          ls -lh "$FILENAME"
          FILES_RESP=$($ZCURL "https://zenodo.org/api/records/$NEW_ID/draft/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          echo "Existing files: $FILES_RESP"
          FILE_KEYS=$(echo "$FILES_RESP" | grep -o '"key": *"[^"]*"' | sed 's/"key": *"//;s/"//' || true)
          for key in $FILE_KEYS; do
            ENCODED_KEY=$(echo "$key" | sed 's|/|%2F|g')
            echo "Deleting: $key"
            $ZCURL -X DELETE \
              "https://zenodo.org/api/records/$NEW_ID/draft/files/$ENCODED_KEY" \
              -H "Authorization: Bearer $ZENODO_TOKEN"
          done
          INIT=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$NEW_ID/draft/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "[{\"key\": \"$FILENAME\"}]")
          echo "Init status: $(echo "$INIT" | grep "HTTP_STATUS:" | cut -d: -f2)"
          UPLOAD=$(curl -s --max-time 300 -w "\nHTTP_STATUS:%{http_code}" -X PUT \
            "https://zenodo.org/api/records/$NEW_ID/draft/files/$FILENAME/content" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$FILENAME")
          UPLOAD_STATUS=$(echo "$UPLOAD" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Upload status: $UPLOAD_STATUS"
          if [ "$UPLOAD_STATUS" != "200" ]; then
            echo "ERROR: upload failed"; exit 1
          fi
          COMMIT=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$NEW_ID/draft/files/$FILENAME/commit" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          COMMIT_STATUS=$(echo "$COMMIT" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Commit status: $COMMIT_STATUS"
          if [ "$COMMIT_STATUS" != "200" ]; then
            echo "ERROR: commit failed"; exit 1
          fi

      - name: Zenodo — publish
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          ZCURL="curl -s --retry 3 --retry-delay 20 --max-time 60"
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          RESP=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$NEW_ID/draft/actions/publish" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Publish status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "202" ]; then
            echo "ERROR: $(echo "$RESP" | grep -v "HTTP_STATUS:")"
            exit 1
          fi
          echo "Published Zenodo version ${{ steps.version.outputs.value }}"
