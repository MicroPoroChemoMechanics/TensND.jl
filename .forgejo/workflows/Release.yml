name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: codeberg-medium-lazy

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          fetch-depth: 0

      - name: Read version from Project.toml
        id: version
        run: |
          VERSION=$(grep '^version' Project.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Abort if tag already exists
        run: |
          VERSION=v${{ steps.version.outputs.value }}
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "ERROR: tag $VERSION already exists. Bump the version in Project.toml first."
            exit 1
          fi

      - name: Install Julia
        run: |
          curl -fsSL https://install.julialang.org | sh -s -- --yes
          echo "$HOME/.juliaup/bin" >> $GITHUB_PATH

      - name: Register in MPCM-Registry
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          git config --global user.name "forgejo-actions[bot]"
          git config --global user.email "forgejo-actions[bot]@users.noreply.codeberg.org"
          git config --global url."https://forgejo-token:${PUSH_TOKEN}@codeberg.org/".insteadOf "https://codeberg.org/"
          julia -e '
            using Pkg
            Pkg.add("LocalRegistry")
            using LocalRegistry
            Pkg.Registry.add(RegistrySpec(url="https://codeberg.org/MicroPoroChemoMechanics/MPCM-Registry.git"))
            register(pwd(); registry="MPCM-Registry", push=true,
                     repo="https://codeberg.org/MicroPoroChemoMechanics/TensND.jl.git",
                     ignore_reregistration=true)
          '

      - name: Create and push tag
        run: |
          VERSION=v${{ steps.version.outputs.value }}
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Tag $VERSION created and pushed"

      - name: Create Codeberg release
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          VERSION=v${{ steps.version.outputs.value }}
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://codeberg.org/api/v1/repos/MicroPoroChemoMechanics/TensND.jl/releases" \
            -H "Authorization: token $PUSH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$VERSION\",\"name\":\"$VERSION\",\"body\":\"Release $VERSION\",\"draft\":false,\"prerelease\":false}")
          HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Codeberg release status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: $(echo "$RESP" | grep -v "HTTP_STATUS:")"
            exit 1
          fi
          echo "Codeberg release $VERSION created"
