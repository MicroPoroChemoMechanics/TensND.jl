name: Release

on:
  workflow_dispatch:

jobs:
  tag-and-register:
    runs-on: codeberg-medium-lazy

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          fetch-depth: 0

      - name: Read version from Project.toml
        id: version
        run: |
          VERSION=$(grep '^version' Project.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Abort if tag already exists
        run: |
          VERSION=v${{ steps.version.outputs.value }}
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "ERROR: tag $VERSION already exists. Bump the version in Project.toml first."
            exit 1
          fi

      - name: Install Julia
        run: |
          curl -fsSL https://install.julialang.org | sh -s -- --yes
          echo "$HOME/.juliaup/bin" >> $GITHUB_PATH

      - name: Register in MPCM-Registry
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          git config --global user.name "forgejo-actions[bot]"
          git config --global user.email "forgejo-actions[bot]@users.noreply.codeberg.org"
          git config --global url."https://forgejo-token:${PUSH_TOKEN}@codeberg.org/".insteadOf "https://codeberg.org/"
          julia -e '
            using Pkg
            Pkg.add("LocalRegistry")
            using LocalRegistry
            Pkg.Registry.add(RegistrySpec(url="https://codeberg.org/MicroPoroChemoMechanics/MPCM-Registry.git"))
            register(pwd(); registry="MPCM-Registry", push=true,
                     repo="https://codeberg.org/MicroPoroChemoMechanics/TensND.jl.git",
                     ignore_reregistration=true)
          '

      - name: Zenodo — create new version draft
        id: zenodo_draft
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          # CONCEPT_ID = first deposit ID, never changes
          CONCEPT_ID=17985768
          # Find latest published version (records API = published only, no drafts)
          LATEST=$(curl -s \
            "https://zenodo.org/api/records?q=conceptrecid:$CONCEPT_ID&sort=mostrecent&size=1" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          LATEST_ID=$(echo "$LATEST" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
          if [ -z "$LATEST_ID" ]; then
            echo "ERROR: could not find latest published version"
            exit 1
          fi
          echo "Latest published version ID: $LATEST_ID"
          # Try to create a new version draft
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$LATEST_ID/versions" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Create version status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "201" ]; then
            NEW_ID=$(echo "$BODY" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
            echo "New draft created: $NEW_ID"
          else
            echo "Create failed (response: ${BODY:0:200}), searching for existing draft..."
            # A draft from a previous run may already exist — reuse it
            DRAFTS=$(curl -s \
              "https://zenodo.org/api/user/records?q=conceptrecid:$CONCEPT_ID&is_draft=true&sort=mostrecent&size=1" \
              -H "Authorization: Bearer $ZENODO_TOKEN")
            echo "Existing drafts: ${DRAFTS:0:300}"
            NEW_ID=$(echo "$DRAFTS" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
            if [ -z "$NEW_ID" ]; then
              echo "ERROR: could not create or find a draft"
              exit 1
            fi
            echo "Reusing existing draft: $NEW_ID"
          fi
          echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
          echo "Draft ID: $NEW_ID"

      - name: Zenodo — update version metadata
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          VERSION=${{ steps.version.outputs.value }}
          # GET full draft, update only version field, PUT back complete metadata
          DRAFT=$(curl -s \
            "https://zenodo.org/api/records/$NEW_ID/draft" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          UPDATED=$(echo "$DRAFT" | python3 -c "import sys,json;d=json.load(sys.stdin);d['metadata']['version']=sys.argv[1];print(json.dumps({'metadata':d['metadata']}))" "$VERSION")
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PUT \
            "https://zenodo.org/api/records/$NEW_ID/draft" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$UPDATED")
          echo "Metadata update status: $(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)"

      - name: Zenodo — upload source archive
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          VERSION=${{ steps.version.outputs.value }}
          FILENAME="TensND.jl-v${VERSION}.tar.gz"
          echo "Draft ID: $NEW_ID  Archive: $FILENAME"
          git archive --format=tar.gz --prefix="TensND.jl-${VERSION}/" -o "$FILENAME" HEAD
          ls -lh "$FILENAME"
          # Delete existing files in draft (copied from previous version)
          FILES_RESP=$(curl -s \
            "https://zenodo.org/api/records/$NEW_ID/draft/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          echo "Existing files: $FILES_RESP"
          FILE_KEYS=$(echo "$FILES_RESP" | grep -o '"key": *"[^"]*"' | sed 's/"key": *"//;s/"//')
          for key in $FILE_KEYS; do
            echo "Deleting: $key"
            ENCODED_KEY=$(echo "$key" | sed 's|/|%2F|g')
            curl -s -X DELETE \
              "https://zenodo.org/api/records/$NEW_ID/draft/files/$ENCODED_KEY" \
              -H "Authorization: Bearer $ZENODO_TOKEN"
          done
          # Initialize upload
          INIT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$NEW_ID/draft/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "[{\"key\": \"$FILENAME\"}]")
          echo "Init status: $(echo "$INIT" | grep "HTTP_STATUS:" | cut -d: -f2)"
          # Upload content
          UPLOAD=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PUT \
            "https://zenodo.org/api/records/$NEW_ID/draft/files/$FILENAME/content" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$FILENAME")
          UPLOAD_STATUS=$(echo "$UPLOAD" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Upload status: $UPLOAD_STATUS"
          if [ "$UPLOAD_STATUS" != "200" ]; then
            echo "ERROR: upload failed"; exit 1
          fi
          # Commit
          COMMIT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$NEW_ID/draft/files/$FILENAME/commit" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          COMMIT_STATUS=$(echo "$COMMIT" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Commit status: $COMMIT_STATUS"
          if [ "$COMMIT_STATUS" != "200" ]; then
            echo "ERROR: commit failed"; exit 1
          fi

      - name: Zenodo — publish
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$NEW_ID/draft/actions/publish" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Publish status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "202" ]; then
            echo "ERROR: $(echo "$RESP" | grep -v "HTTP_STATUS:")"
            exit 1
          fi
          echo "Published Zenodo version ${{ steps.version.outputs.value }}"

      - name: Create and push tag
        run: |
          VERSION=v${{ steps.version.outputs.value }}
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Tag $VERSION created and pushed"
