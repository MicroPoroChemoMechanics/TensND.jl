name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.8)'
        required: true

jobs:
  tag-and-register:
    runs-on: codeberg-small

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          fetch-depth: 0

      - name: Install Julia
        run: |
          curl -fsSL https://install.julialang.org | sh -s -- --yes
          echo "$HOME/.juliaup/bin" >> $GITHUB_PATH

      - name: Bump version in Project.toml
        run: |
          sed -i 's/^version = .*/version = "${{ inputs.version }}"/' Project.toml
          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@users.noreply.codeberg.org"
          git add Project.toml
          git commit -m "Set version to ${{ inputs.version }}"

      - name: Create and push tag
        run: |
          git tag v${{ inputs.version }}
          git push origin main
          git push origin v${{ inputs.version }}

      - name: Register in Codeberg registry
        run: |
          julia -e '
            using Pkg
            Pkg.add("LocalRegistry")
            Pkg.develop(PackageSpec(path=pwd()))
            using LocalRegistry, TensND
            Pkg.Registry.add(RegistrySpec(url="ssh://git@codeberg.org/MicroPoroChemoMechanics/MPCM-Registry.git"))
            register(TensND; registry="MPCM-Registry", push=true,
                     repo="ssh://git@codeberg.org/MicroPoroChemoMechanics/TensND.jl.git")
          '
