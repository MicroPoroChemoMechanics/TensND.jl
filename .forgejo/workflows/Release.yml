name: Release

on:
  workflow_dispatch:

jobs:
  tag-and-register:
    runs-on: codeberg-medium-lazy

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          fetch-depth: 0

      - name: Read version from Project.toml
        id: version
        run: |
          VERSION=$(grep '^version' Project.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Abort if tag already exists
        run: |
          VERSION=v${{ steps.version.outputs.value }}
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "ERROR: tag $VERSION already exists. Bump the version in Project.toml first."
            exit 1
          fi

      - name: Install Julia
        run: |
          curl -fsSL https://install.julialang.org | sh -s -- --yes
          echo "$HOME/.juliaup/bin" >> $GITHUB_PATH

      - name: Register in MPCM-Registry
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          git config --global user.name "forgejo-actions[bot]"
          git config --global user.email "forgejo-actions[bot]@users.noreply.codeberg.org"
          git config --global url."https://forgejo-token:${PUSH_TOKEN}@codeberg.org/".insteadOf "https://codeberg.org/"
          julia -e '
            using Pkg
            Pkg.add("LocalRegistry")
            using LocalRegistry
            Pkg.Registry.add(RegistrySpec(url="https://codeberg.org/MicroPoroChemoMechanics/MPCM-Registry.git"))
            register(pwd(); registry="MPCM-Registry", push=true,
                     repo="https://codeberg.org/MicroPoroChemoMechanics/TensND.jl.git",
                     ignore_reregistration=true)
          '

      - name: Zenodo — create new version draft
        id: zenodo_draft
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          # CONCEPT_ID = ID of the first deposit, never changes across versions
          CONCEPT_ID=17985768
          # Dynamically find the latest published version's deposit ID
          LATEST=$(curl -s \
            "https://zenodo.org/api/deposit/depositions?q=conceptrecid:$CONCEPT_ID&sort=mostrecent&size=1" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          echo "Latest depositions response: $LATEST"
          LATEST_ID=$(echo "$LATEST" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
          if [ -z "$LATEST_ID" ]; then
            echo "ERROR: could not find latest version ID for concept $CONCEPT_ID"
            exit 1
          fi
          echo "Latest version deposit ID: $LATEST_ID"
          # Create new version draft from latest
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/deposit/depositions/$LATEST_ID/actions/newversion" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Zenodo API returned HTTP $HTTP_STATUS"
            exit 1
          fi
          NEW_ID=$(echo "$BODY" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
          if [ -z "$NEW_ID" ]; then
            echo "ERROR: could not extract new draft ID from response"
            exit 1
          fi
          echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
          echo "Zenodo new draft ID: $NEW_ID"

      - name: Zenodo — update version metadata
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          curl -s -X PUT \
            "https://zenodo.org/api/deposit/depositions/$NEW_ID" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"metadata\":{\"version\":\"${{ steps.version.outputs.value }}\"}}"

      - name: Zenodo — upload source archive
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          VERSION=${{ steps.version.outputs.value }}
          FILENAME="TensND.jl-v${VERSION}.tar.gz"
          git archive --format=tar.gz \
            --prefix="TensND.jl-${VERSION}/" \
            -o "$FILENAME" \
            HEAD
          OLD_FILES=$(curl -s \
            "https://zenodo.org/api/deposit/depositions/$NEW_ID/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN" | grep -o '"filename":"[^"]*"' | cut -d'"' -f4)
          FILE_IDS=$(curl -s \
            "https://zenodo.org/api/deposit/depositions/$NEW_ID/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN" | grep -o '"id":"[^"]*"' | cut -d'"' -f4)
          for fid in $FILE_IDS; do
            curl -s -X DELETE \
              "https://zenodo.org/api/deposit/depositions/$NEW_ID/files/$fid" \
              -H "Authorization: Bearer $ZENODO_TOKEN"
          done
          curl -s -X POST \
            "https://zenodo.org/api/deposit/depositions/$NEW_ID/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -F "name=$FILENAME" \
            -F "file=@$FILENAME"

      - name: Zenodo — publish
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          NEW_ID=${{ steps.zenodo_draft.outputs.new_id }}
          curl -s -X POST \
            "https://zenodo.org/api/deposit/depositions/$NEW_ID/actions/publish" \
            -H "Authorization: Bearer $ZENODO_TOKEN"
          echo "Published Zenodo version ${{ steps.version.outputs.value }}"

      - name: Create and push tag
        run: |
          VERSION=v${{ steps.version.outputs.value }}
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Tag $VERSION created and pushed"
