name: Documentation

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  build:
    runs-on: codeberg-medium-lazy
    container:
      image: julia:1

    steps:
      - uses: actions/checkout@v4

      - name: Install Python, SymPy and git
        run: |
          apt-get update -q
          apt-get install -y -q python3 python3-pip git ssh
          pip3 install sympy --break-system-packages || pip3 install sympy

      - name: Install doc dependencies
        run: |
          julia -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.activate("docs/")
            ENV["PYTHON"] = Sys.which("python3")
            Pkg.add("PyCall")
            Pkg.build("PyCall")
            Pkg.instantiate()
          '

      - name: Run doctests
        run: |
          julia --project=docs/ -e '
            using Documenter: DocMeta, doctest
            using TensND
            DocMeta.setdocmeta!(TensND, :DocTestSetup,
                :(using TensND, LinearAlgebra, SymPy, Tensors, OMEinsum, Rotations);
                recursive=true)
            doctest(TensND)
          '

      - name: Build and deploy
        env:
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs/ docs/make.jl
