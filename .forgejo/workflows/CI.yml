name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }}
    runs-on: codeberg-medium-lazy
    timeout-minutes: 1440
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
          - 'nightly'
    container:
      image: julia:${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Python and SymPy
        run: |
          apt-get update -q
          apt-get install -y -q python3 python3-pip
          pip3 install sympy --break-system-packages || pip3 install sympy

      - name: Configure PyCall with system Python
        run: |
          julia -e '
            using Pkg
            Pkg.add("PyCall")
            Pkg.add("SymPy")
            ENV["PYTHON"] = Sys.which("python3")
            Pkg.build("PyCall")
          '

      - name: Build package
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        run: julia --project -e 'using Pkg; Pkg.test()'
