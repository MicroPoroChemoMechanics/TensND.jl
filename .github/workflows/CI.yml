name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
          - 'nightly'
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64

    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Install dependencies
        run: |
          julia -e '
            using Pkg
            ENV["PYTHON"] = ""
            Pkg.add("PyCall")
            Pkg.add("SymPy")
            Pkg.build("PyCall")
            using PyCall
            pyimport_conda("sympy", "sympy")'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          # Instrument only the primary job: coverage disables precompilation
          # caching and would slow down every other matrix entry for nothing.
          coverage: ${{ matrix.os == 'ubuntu-latest' && matrix.version == '1' }}
      # Not julia-actions/julia-processcoverage: see the header of the script
      # for why its `amend_coverage_from_src!` step misreports this package.
      - name: Process coverage
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
        shell: julia --color=yes {0}
        run: |
          using Pkg
          Pkg.activate(; temp = true)
          Pkg.add("Coverage")
          # `pwd()` is the workspace root.  An absolute path is required: the
          # `run:` block is written to a temp file by the runner, and `include`
          # resolves relative to THAT file's directory, not the cwd.
          include(joinpath(pwd(), ".github", "scripts", "coverage.jl"))
      - uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
